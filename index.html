<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전국 축제 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#0f1117; color:#e8e8e8; height:100vh; display:flex; flex-direction:column; }

  header {
    background:#181c27;
    border-bottom:1px solid #252a3a;
    padding:10px 18px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .header-top {
    display:flex;
    align-items:center;
    gap:12px;
  }
  .title { font-size:14px; font-weight:700; color:#fff; letter-spacing:-0.3px; white-space:nowrap; }
  .today-badge { font-size:11px; color:#8a8fa8; background:#1e2232; padding:3px 9px; border-radius:20px; border:1px solid #2e3448; white-space:nowrap; }
  .count-badge { font-size:11px; color:#8a8fa8; background:#1e2232; padding:3px 9px; border-radius:20px; border:1px solid #2e3448; white-space:nowrap; margin-left:auto; }

  .filter-row {
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .filter-label {
    font-size:11px;
    color:#5a6080;
    white-space:nowrap;
    min-width:52px;
  }
  .filter-btns {
    display:flex;
    gap:5px;
    flex-wrap:wrap;
  }

  .btn {
    padding:4px 11px;
    border-radius:20px;
    border:1.5px solid #2e3348;
    background:#1a1e2e;
    color:#8a8fa8;
    font-size:11px;
    font-weight:500;
    cursor:pointer;
    transition:all 0.15s;
    white-space:nowrap;
    display:inline-flex;
    align-items:center;
    gap:5px;
  }
  .btn:hover { color:#d0d4f0; border-color:#4a5080; }
  .btn.active { color:#fff; font-weight:700; }

  /* 진행현황 버튼 active 색 */
  .btn.s-all.active    { background:#2e3560; border-color:#5a6adf; }
  .btn.s-ongoing.active  { background:#1a3320; border-color:#3ecf6e; }
  .btn.s-upcoming.active { background:#1a2840; border-color:#4fa3f7; }
  .btn.s-ended.active    { background:#2a1e1e; border-color:#666; }

  /* 월별 버튼 active 색 */
  .btn.m-all.active { background:#2e3560; border-color:#5a6adf; }
  .btn.month.active { background:#2e3560; border-color:#5a6adf; }

  .btn .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .cnt { font-size:10px; background:rgba(255,255,255,0.1); padding:1px 5px; border-radius:10px; }

  #map { flex:1; }

  /* Popup */
  .leaflet-popup-content-wrapper {
    background:#1e2232; border:1px solid #2e3450;
    border-radius:10px; box-shadow:0 4px 20px rgba(0,0,0,0.6);
    color:#e8e8e8; padding:0;
  }
  .leaflet-popup-content { margin:0; }
  .leaflet-popup-tip { background:#1e2232; }
  .leaflet-popup-close-button { color:#8a8fa8 !important; font-size:16px !important; top:10px !important; right:10px !important; }
  .popup-inner { padding:13px 15px; min-width:200px; }
  .popup-status {
    display:inline-flex; align-items:center; gap:5px;
    font-size:11px; font-weight:700; padding:2px 8px;
    border-radius:20px; margin-bottom:6px;
  }
  .popup-status.ongoing  { background:#1a3320; color:#3ecf6e; border:1px solid #2a5a38; }
  .popup-status.upcoming { background:#1a2840; color:#4fa3f7; border:1px solid #2a4870; }
  .popup-status.ended    { background:#252525; color:#888;    border:1px solid #3a3a3a; }
  .popup-month { font-size:11px; color:#8a8fa8; margin-bottom:4px; }
  .popup-name  { font-size:14px; font-weight:600; color:#fff; margin-bottom:8px; line-height:1.4; }
  .popup-date  { font-size:12px; color:#8ecfff; }

  /* Legend */
  .legend {
    position:absolute; bottom:24px; left:12px; z-index:999;
    background:#181c27cc; backdrop-filter:blur(8px);
    border:1px solid #252a3a; border-radius:10px;
    padding:10px 14px; font-size:11px; line-height:2;
  }
  .legend-row { display:flex; align-items:center; gap:7px; color:#c0c4d8; }
  .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

  .divider { width:1px; height:16px; background:#2e3448; flex-shrink:0; }
</style>
</head>

</header>

<div id="map"></div>

</div>

const STATUS_CFG = {
  ongoing:  { color:'#3ecf6e', glow:'#3ecf6e66', label:'진행중',   size:13, z:1000 },
  upcoming: { color:'#4fa3f7', glow:null,         label:'진행예정', size:11, z:0 },
  ended:    { color:'#555',    glow:null,          label:'종료',     size:10, z:0 },
};

// Map init
const map = L.map('map', { center:[36.5,127.8], zoom:7 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);

let markers = [];
let activeStatus = 'all';
let activeMonth = 'all';

// Count init
const counts = { ongoing:0, upcoming:0, ended:0 };
FESTIVALS.forEach(f => counts[f.status]++);
document.getElementById('cnt-all').textContent = FESTIVALS.length;
document.getElementById('cnt-ongoing').textContent = counts.ongoing;
document.getElementById('cnt-upcoming').textContent = counts.upcoming;
document.getElementById('cnt-ended').textContent = counts.ended;

// Build month buttons
const months = [...new Set(FESTIVALS.map(f => f.month))].sort((a,b)=>a-b);
const mContainer = document.getElementById('month-filters');
months.forEach(m => {
  const btn = document.createElement('button');
  btn.className = 'btn month';
  btn.dataset.month = m;
  btn.textContent = `${m}월`;
  mContainer.appendChild(btn);
});

function createIcon(status) {
  const cfg = STATUS_CFG[status];
  const shadow = cfg.glow ? `box-shadow:0 0 7px 2px ${cfg.glow};` : '';
  return L.divIcon({
    className:'',
    html:`<div style="width:${cfg.size}px;height:${cfg.size}px;border-radius:50%;background:${cfg.color};border:2px solid rgba(255,255,255,${status==='ended'?0.15:0.6});${shadow}"></div>`,
    iconSize:[cfg.size,cfg.size], iconAnchor:[cfg.size/2,cfg.size/2],
  });
}

function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const filtered = FESTIVALS.filter(f => {
    const statusOk = activeStatus === 'all' || f.status === activeStatus;
    const monthOk  = activeMonth  === 'all' || f.month  === activeMonth;
    return statusOk && monthOk;
  });

  document.getElementById('count-badge').textContent = `${filtered.length}개`;

  ['ended','upcoming','ongoing'].forEach(s => {
    filtered.filter(f => f.status === s).forEach(f => {
      const cfg = STATUS_CFG[f.status];
      const m = L.marker([f.lat, f.lon], { icon:createIcon(f.status), zIndexOffset:cfg.z });
      m.bindPopup(`
        <div class="popup-inner">
          <span class="popup-status ${f.status}">${cfg.label}</span>
          <div class="popup-month">${f.month}월 시작</div>
          <div class="popup-name">${f.name}</div>
          <div class="popup-date">📅 ${f.startdate} ~ ${f.enddate}</div>
        </div>`, { maxWidth:260, minWidth:200 });
      m.addTo(map);
      markers.push(m);
    });
  });
}

// Status filter
document.getElementById('status-filters').addEventListener('click', e => {
  const btn = e.target.closest('[data-status]');
  if (!btn) return;
  document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeStatus = btn.dataset.status;
  renderMarkers();
});

// Month filter
document.getElementById('month-filters').addEventListener('click', e => {
  const btn = e.target.closest('[data-month]');
  if (!btn) return;
  document.querySelectorAll('[data-month]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeMonth = btn.dataset.month === 'all' ? 'all' : parseInt(btn.dataset.month);
  renderMarkers();
});

renderMarkers();
</script>
